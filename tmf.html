<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二重埔慈元宮</title>
    <style>
        /* 全域樣式與平滑滾動 */
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Arial', 'Microsoft JhengHei', sans-serif;
            background-color: #fffde7; /* 溫暖的淺黃色背景 */
            color: #333;
            margin: 0;
            padding: 0;
        }

        /* 固定在頂部的導覽列 */
        header {
            background-color: #ffeb3b; /* 小新亮黃色 */
            padding: 15px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-sizing: border-box;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #e53935; /* 經典紅色 */
            text-decoration: none;
        }

        nav a {
            color: #0288d1; /* 動感超人藍 */
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #e53935;
        }

        /* 區塊容器 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 120px 20px 40px 20px; /* 留 padding 防止內容被置頂導覽列遮擋 */
        }

        section {
            background-color: #ffffff;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 60px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            color: #e53935;
            border-bottom: 3px solid #ffeb3b;
            padding-bottom: 10px;
            margin-top: 0;
        }

        h2 {
            color: #0288d1;
            margin-top: 25px;
        }

        blockquote {
            background: #fff9c4;
            border-left: 5px solid #e53935;
            margin: 1.5em 0;
            padding: 10px 15px;
            border-radius: 0 5px 5px 0;
        }

        /* 卡片式排版（角色與劇場版使用） */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            border: 2px solid #ffeb3b;
            border-radius: 10px;
            padding: 20px;
            background-color: #fff9c4;
        }

        .card h3 {
            color: #e53935;
            margin-top: 0;
        }

        .card-blue {
            border: 2px solid #0288d1;
            background-color: #e1f5fe;
        }

        .card-blue h3 {
            color: #0288d1;
        }

        .rating {
            color: #f57c00;
            font-weight: bold;
        }

        /* 聯絡表單樣式 */
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #0288d1;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background-color: #e53935;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #b71c1c;
        }

        /* 頁尾 */
        footer {
            text-align: center;
            padding: 25px;
            background-color: #0288d1;
            color: white;
        }
    </style>
</head>
