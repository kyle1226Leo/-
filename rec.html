<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二重埔慈元宮 - 宮廟歷史紀錄</title>
    <style>
        /* =========================================
           1. 原有的基礎樣式（保持不變）
           ========================================= */
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", 'Arial', 'Microsoft JhengHei', sans-serif;
            background-color: #fffde7; /* 溫暖的淺黃色背景 */
            color: #333333;
            margin: 0;
            padding: 0;
        }

        /* 固定在頂部的導覽列 */
        header {
            background-color: #ffeb3b; /* 亮黃色 */
            padding: 15px 20px;       
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-sizing: border-box;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap; /* 支援手機端自動換行 */
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        
        .logo img {
            display: block;
            width: 100px;
            height: 100px;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        nav a {
            color: #0288d1; /* 動感超人藍 */
            text-decoration: none;
            margin-left: 20px;
            margin-top: 5px;
            margin-bottom: 5px;
            font-weight: bold;
            transition: color 0.3s;
            white-space: nowrap; /* 防止中文字斷行 */
        }

        nav a:hover {
            color: #e53935; /* 經典紅色 */
        }

        /* 主要內容置中區塊 */
        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 180px 15px 40px 15px; /* 配合 Logo 頂部間距 */
            box-sizing: border-box;
        }

        /* 紀錄卡片樣式 */
        .record-card {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 35px;
            padding: 20px;
            box-sizing: border-box;
            border: 1px solid #ffeb3b;
        }

        /* 標題與時間區塊 */
        .record-header {
            margin-bottom: 15px;
            border-left: 4px solid #e41e3f; /* 宮廟紅裝飾線 */
            padding-left: 10px;
        }

        .record-title {
            font-size: 20px;
            font-weight: bold;
            margin: 0 0 5px 0;
            color: #111111;
        }

        .record-time {
            font-size: 13px;
            color: #777777;
            margin: 0;
        }

        /* 文字敘述 */
        .record-content {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 15px;
            white-space: pre-line; /* 支援文字直接換行 */
            color: #444444;
        }

        /* 頁尾 */
        footer {
            text-align: center;
            padding: 25px;
            background-color: #0288d1;
            color: white;
            font-weight: bold;
            margin-top: 40px;
        }

        /* =========================================
           2. FB 風格四格照片格線
           ========================================= */
        .record-image-container {
            width: 100%;
            border-radius: 6px;
            overflow: hidden;
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 6px; 
        }

        .img-box {
            position: relative;
            width: 100%;
            height: 160px; 
            overflow: hidden;
            display: block;
        }

        /* 超過 4 張時，網頁畫面上隱藏，但功能保留 */
        .img-box.hide-thumb {
            display: none;
        }

        .record-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
        }
        
        .record-thumbnail:hover {
            opacity: 0.85;
            transform: scale(1.02);
        }

        /* 只有 1 張照片時撐滿 */
        .record-image-container.count-1 {
            grid-template-columns: 1fr;
        }
        .record-image-container.count-1 .img-box {
            height: 280px;
        }

        /* FB 經典黑底遮罩 */
        .more-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.55); 
            color: #ffffff;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer; /* 讓遮罩也顯示手指，提示可點擊 */
        }

        /* =========================================
           3. 升級版 Lightbox 彈出視窗與控制鈕 CSS
           ========================================= */
        .lightbox-overlay {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9); 
            z-index: 2000; 
            justify-content: center;
            align-items: center;
        }

        /* 大圖容器 */
        .lightbox-content-wrapper {
            position: relative;
            max-width: 90%;
            max-height: 85%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lightbox-image {
            max-width: 100%; 
            max-height: 85vh; 
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            user-select: none; /* 防止連續點擊時選取到圖片藍底 */
        }

        /* 頂部右上角關閉按鈕 */
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #ffffff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 2100;
            transition: color 0.2s;
        }
        .lightbox-close:hover {
            color: #ffeb3b;
        }

        /* 左右切換箭頭通用樣式 */
        .lightbox-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.4);
            color: #ffffff;
            border: none;
            font-size: 32px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2100;
            transition: background-color 0.2s, color 0.2s;
            user-select: none;
        }
        .lightbox-nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.9);
            color: #111111;
        }

        .btn-prev { left: -70px; } /* 置於大圖左側側邊 */
        .btn-next { right: -70px; } /* 置於大圖右側側邊 */

        /* 手機板響應式微調 */
        @media (max-width: 768px) {
            .nav-container { justify-content: center; flex-direction: column; }
            nav { justify-content: center; margin-top: 10px; }
            nav a { margin: 5px 10px; }
            .container { padding-top: 240px; }
            .img-box { height: 120px; } 
            .record-image-container.count-1 .img-box { height: 200px; }
            
            .lightbox-close { top: 15px; right: 20px; font-size: 35px; }
            /* 手機版將箭頭往內縮，移入畫面邊緣內 */
            .btn-prev { left: 5px; background-color: rgba(0,0,0,0.6); }
            .btn-next { right: 5px; background-color: rgba(0,0,0,0.6); }
            .lightbox-nav-btn { width: 40px; height: 40px; font-size: 24px; }
        }
    </style>
</head>
<body>

    <div id="lightboxOverlay" class="lightbox-overlay">
        <span class="lightbox-close" id="lightboxCloseBtn">&times;</span>
        <div class="lightbox-content-wrapper">
            <button class="lightbox-nav-btn btn-prev" id="lightboxPrevBtn">&#10094;</button>
            
            <img id="lightboxImage" src="" alt="放大照片" class="lightbox-image">
            
            <button class="lightbox-nav-btn btn-next" id="lightboxNextBtn">&#10095;</button>
        </div>
    </div>

    <script>
        // 用來儲存當前正在觀看的相簿資料
        let currentAlbumSources = []; // 當前相簿的所有圖片路徑陣列
        let currentImageIndex = 0;    // 當前正在看第幾張圖

        // 取得 Lightbox 相關控制元素
        const overlay = document.getElementById('lightboxOverlay');
        const lightboxImg = document.getElementById('lightboxImage');
        const closeBtn = document.getElementById('lightboxCloseBtn');
        const prevBtn = document.getElementById('lightboxPrevBtn');
        const nextBtn = document.getElementById('lightboxNextBtn');

        // 1. 初始化每本相簿（卡片）的排版與點擊事件
        const containers = document.querySelectorAll('.record-image-container');
        
        containers.forEach(container => {
            const imgBoxes = container.querySelectorAll('.img-box');
            const totalCount = imgBoxes.length;

            // 收集這本相簿裡所有圖片的 src 網址
            const albumSrcs = [];
            container.querySelectorAll('.record-thumbnail').forEach(img => {
                albumSrcs.push(img.src);
            });

            // 只有 1 張圖的排版處理
            if (totalCount === 1) {
                container.classList.add('count-1');
            }

            // 超過 4 張圖時的 FB 排版與遮罩處理
            if (totalCount > 4) {
                imgBoxes.forEach((box, index) => {
                    if (index >= 4) {
                        box.classList.add('hide-thumb'); // 網頁畫面隱藏第5張之後
                    }
                    if (index === 3) {
                        const remaining = totalCount - 4;
                        if (remaining > 0) {
                            const mask = document.createElement('div');
                            mask.className = 'more-mask';
                            mask.innerText = `+${remaining}`;
                            
                            // 當點擊「+N」遮罩時，等同於點擊它下面的第 4 張圖片
                            mask.addEventListener('click', function(e) {
                                e.stopPropagation(); // 防止事件干擾
                                openLightbox(albumSrcs, 3);
                            });
                            box.appendChild(mask);
                        }
                    }
                });
            }

            // 幫這本相簿裡的每一張縮圖綁定「開啟相簿」事件
            container.querySelectorAll('.record-thumbnail').forEach((thumb, index) => {
                thumb.addEventListener('click', function() {
                    openLightbox(albumSrcs, index);
                });
            });
        });

        // 2. 開啟 Lightbox 函式
        function openLightbox(albumArray, index) {
            currentAlbumSources = albumArray; // 載入整本相簿的圖片清單
            currentImageIndex = index;        // 設定目前看第幾張
            
            updateLightboxImage();            // 更新大圖顯示
            overlay.style.display = 'flex';   // 顯示黑底視窗
            document.body.style.overflow = 'hidden'; // 鎖定網頁滾動
        }

        // 3. 更新大圖切換顯示的控制核心
        function updateLightboxImage() {
            if (currentAlbumSources.length === 0) return;
            
            // 防呆機制：如果索引值超出範圍則循環
            if (currentImageIndex < 0) {
                currentImageIndex = currentAlbumSources.length - 1; // 換到最後一張
            } else if (currentImageIndex >= currentAlbumSources.length) {
                currentImageIndex = 0; // 換回第一張
            }

            // 將對應的圖片路徑塞給大圖標籤
            lightboxImg.src = currentAlbumSources[currentImageIndex];

            // 如果這本相簿只有一張圖，隱藏左右控制箭頭，否則顯示
            if (currentAlbumSources.length <= 1) {
                prevBtn.style.display = 'none';
                nextBtn.style.display = 'none';
            } else {
                prevBtn.style.display = 'flex';
                nextBtn.style.display = 'flex';
            }
        }

        // 4. 切換下一張 / 上一張 的功能
        function showNextImage() {
            currentImageIndex++;
            updateLightboxImage();
        }

        function showPrevImage() {
            currentImageIndex--;
            updateLightboxImage();
        }

        // 5. 關閉 Lightbox 函式
        function closeLightbox() {
            overlay.style.display = 'none';
            lightboxImg.src = '';
            currentAlbumSources = [];
            document.body.style.overflow = 'auto'; // 恢復網頁滾動
        }

        // 6. 綁定所有的點擊與按鍵事件
        nextBtn.addEventListener('click', function(e) {
            e.stopPropagation(); // 防止點到大圖關閉
            showNextImage();
        });

        prevBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            showPrevImage();
        });

        closeBtn.addEventListener('click', closeLightbox);

        // 點擊大圖四周的黑色背景處就關閉
        overlay.addEventListener('click', function(e) {
            if (e.target === overlay || e.target.classList.contains('lightbox-content-wrapper')) {
                closeLightbox();
            }
        });

        // 7. 智慧鍵盤監聽功能（支援 左右鍵、Esc鍵）
        document.addEventListener('keydown', function(e) {
            // 只有在 Lightbox 打開時才觸發鍵盤事件
            if (overlay.style.display === 'flex') {
                if (e.key === 'ArrowRight') {
                    showNextImage(); // 按鍵盤「→」看下一張
                } else if (e.key === 'ArrowLeft') {
                    showPrevImage(); // 按鍵盤「←」看上一張
                } else if (e.key === 'Escape') {
                    closeLightbox(); // 按鍵盤「Esc」直接關閉
                }
            }
        });
    </script>

</body>
